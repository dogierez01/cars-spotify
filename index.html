<style>
:root{--primary:#0ea5e9;--primary-dark:#0284c7;--bg:#f8fafc;--card:#ffffff;--text:#1e293b;--correct:#22c55e;--wrong:#ef4444;--border:#e2e8f0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background-color:var(--bg);color:var(--text);margin:0;padding:16px;display:flex;justify-content:center}
.app-container{width:100%;max-width:600px;background:var(--card);border-radius:20px;box-shadow:0 10px 15px -3px rgb(0 0 0 / 0.1);padding:24px;box-sizing:border-box;margin-bottom:40px}
h1{text-align:center;font-size:26px;margin-bottom:24px;color:var(--primary-dark)}
.screen{display:none;animation:fadeIn 0.3s ease-in-out}.screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.car-grid{display:grid;grid-template-columns:1fr;gap:12px}@media(min-width:400px){.car-grid{grid-template-columns:1fr 1fr}}
.car-btn{width:100%;padding:16px;border:2px solid var(--primary);border-radius:14px;background:#f0f9ff;font-size:16px;font-weight:700;color:var(--primary-dark);cursor:pointer;transition:all 0.2s;text-align:center;box-shadow:0 2px 4px rgb(0 0 0 / 0.05)}
.car-btn:active{transform:scale(0.98)}
.audio-controls{display:flex;gap:12px;margin-bottom:24px;position:sticky;top:0;background:var(--card);padding:10px 0;border-bottom:2px solid var(--border);z-index:10}
.audio-btn{flex:1;padding:16px;border:none;border-radius:12px;font-size:16px;font-weight:bold;color:white;cursor:pointer}
.play-btn{background:var(--correct)}.stop-btn{background:var(--wrong)}
.question-block{margin-bottom:32px;padding:20px;background:#f8fafc;border-radius:16px;border:1px solid var(--border)}
.question-text{font-size:18px;font-weight:700;margin-bottom:16px;line-height:1.4}
.option-btn{width:100%;padding:14px 16px;margin-bottom:10px;border:2px solid var(--border);border-radius:12px;background:white;font-size:16px;font-weight:500;color:var(--text);cursor:pointer;text-align:left;transition:all 0.2s}
.option-btn.selected-correct{background:var(--correct);color:white;border-color:var(--correct);font-weight:bold}
.option-btn.selected-wrong{background:var(--wrong);color:white;border-color:var(--wrong)}
.option-btn:disabled{cursor:default}
.results-container{display:none;text-align:center;padding:30px 20px;background:#f0fdf4;border:2px solid var(--correct);border-radius:16px;margin-top:30px;animation:fadeIn 0.5s ease-in-out}
.results-container h2{margin-top:0;color:#166534}
.stat-row{display:flex;justify-content:space-around;margin:20px 0;font-size:18px}
.percentage-circle{font-size:36px;font-weight:bold;color:var(--primary-dark);margin:15px 0}
.menu-btn{width:100%;padding:16px;margin-top:20px;background:var(--text);color:white;border:none;border-radius:12px;font-size:18px;font-weight:bold;cursor:pointer}
</style>
</head>
<body>
<div class="app-container">
    <div id="home-screen" class="screen active">

        <p style="text-align:center;margin-bottom:24px;color:#64748b;font-size:16px;">Select a brand, listen carefully, and beat the quiz!</p>

        <div class="audio-controls">

            <button class="audio-btn stop-btn" onclick="stopAudio()">⏹️ Stop</button>
        </div>
        <div id="questions-container"></div>
        <div id="results-section" class="results-container">
            <h2>Quiz Complete!</h2>
            <div class="percentage-circle" id="score-percentage">100%</div>
            <div class="stat-row">

        <button class="menu-btn" onclick="goHome()">⬅ Back to Main Menu</button>
    </div>
</div>

];

let currentAudio = new Audio();
let isPlaying = false;
let totalQuestions = 0;
let questionsAnswered = 0;
let correctAnswers = 0;

const carList = document.getElementById('car-list');
quizData.forEach((car, index) => {
    const btn = document.createElement('button');
    btn.className = 'car-btn';
    btn.innerText = `🎧 ${car.brand}`;
    btn.onclick = () => loadQuiz(index);
    carList.appendChild(btn);
});

function loadQuiz(index) {
    const currentCar = quizData[index];
    document.getElementById('home-screen').classList.remove('active');
    document.getElementById('quiz-screen').classList.add('active');
    document.getElementById('quiz-title').innerText = currentCar.brand;
    document.getElementById('results-section').style.display = 'none';
    
    totalQuestions = currentCar.questions.length;
    questionsAnswered = 0;
    correctAnswers = 0;

    currentAudio.src = currentCar.audioUrl;
    
    const container = document.getElementById('questions-container');
    container.innerHTML = ''; 

    currentCar.questions.forEach((q, qIndex) => {
        const block = document.createElement('div');
        block.className = 'question-block';
        
        const title = document.createElement('div');
        title.className = 'question-text';
        title.innerText = `${qIndex + 1}. ${q.q}`;
        block.appendChild(title);

        q.options.forEach((opt, optIndex) => {
            const optBtn = document.createElement('button');
            optBtn.className = 'option-btn';
            optBtn.innerText = opt;
            optBtn.onclick = () => checkAnswer(optBtn, block, optIndex, q.answer);
            block.appendChild(optBtn);
        });
        container.appendChild(block);
    });
    window.scrollTo(0,0);
}

function checkAnswer(btn, block, selectedIndex, correctIndex) {
    const buttons = block.querySelectorAll('.option-btn');
    buttons.forEach(b => b.disabled = true);
    questionsAnswered++;

    if (selectedIndex === correctIndex) {
        btn.classList.add('selected-correct');
        btn.innerText = "✅ " + btn.innerText;
        correctAnswers++;
    } else {
        btn.classList.add('selected-wrong');
        btn.innerText = "❌ " + btn.innerText;
        buttons[correctIndex].classList.add('selected-correct'); 
    }
    if (questionsAnswered === totalQuestions) {
        showResults();
    }
}

function showResults() {
    const resultsSection = document.getElementById('results-section');
    const percentage = Math.round((correctAnswers / totalQuestions) * 100);
    const wrongAnswers = totalQuestions - correctAnswers;

    document.getElementById('score-percentage').innerText = `${percentage}%`;
    document.getElementById('score-correct').innerText = correctAnswers;
    document.getElementById('score-wrong').innerText = wrongAnswers;
    document.getElementById('score-total').innerText = totalQuestions;

    const percentageElement = document.getElementById('score-percentage');
    if (percentage >= 80) {
        percentageElement.style.color = 'var(--correct)';
    } else if (percentage >= 50) {
        percentageElement.style.color = '#eab308';
    } else {
        percentageElement.style.color = 'var(--wrong)';
    }

    resultsSection.style.display = 'block';
    setTimeout(() => {
        resultsSection.scrollIntoView({ behavior: 'smooth' });
    }, 300);
}

function playAudio() {
    currentAudio.play().catch(e => {
        alert("Failed to load audio from:\n" + currentAudio.src + "\n\nError: " + e.message);
    });
    isPlaying = true;
}

function stopAudio() {
    currentAudio.pause();
    currentAudio.currentTime = 0;
    isPlaying = false;
}

function goHome() {
    stopAudio();
    document.getElementById('quiz-screen').classList.remove('active');
    document.getElementById('home-screen').classList.add('active');
}
</script>
